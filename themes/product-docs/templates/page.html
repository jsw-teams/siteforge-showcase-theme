<main id="main" class="doc-layout">
  <aside class="doc-sidebar" aria-label="文档导航">
    <div class="doc-sidebar-block doc-collection">
      <a class="doc-sidebar-title" href="/zh-CN/docs/">Siteforge docs</a>
      {{{docNav}}}
    </div>
  </aside>
  <article class="doc-article">
    <header class="doc-header">
      <p class="eyebrow">Documentation</p>
      <h1>{{title}}</h1>
      <p class="lead">{{description}}</p>
      {{{languages}}}
    </header>
    <div class="prose">{{{content}}}</div>
  </article>
</main>
