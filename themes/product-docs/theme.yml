name: product-docs
description: Product showcase and documentation theme.
style: style.css
script: scripts/consent.js
templates: templates
i18n: i18n.yml
features:
  search: true
  lightbox: true
  media: true
  comments: false
  webMcp: true
featureScripts:
  search: scripts/search.js
  lightbox: scripts/lightbox.js
  media: scripts/media.js
  comments: scripts/comments.js
featureStyles:
  consent: styles/consent.css
featureCategories:
  search: necessary
  lightbox: necessary
  media: necessary
  comments: preferences
  webMcp: necessary
consent:
  enabled: true
  storageKey: siteforge-product-docs-consent
  revision: 1
  categories:
    necessary:
      required: true
    preferences:
      required: false
    analytics:
      required: false
    marketing:
      required: false
pageStyles:
  home:
    - styles/home.css
    - styles/page.css
  archive: styles/archive.css
  categories: styles/terms.css
  tags: styles/terms.css
  term: styles/terms.css
  page: styles/page.css
pageScripts:
  home: []
  archive: []
  categories: []
  tags: []
  term: []
  page: []
styles: []
scripts:
  head: []
  bodyEnd: []
pagination:
  homePageSize: 8
icons:
  favicon: /favicon.ico
  icon32: /favicon-32x32.png
  appleTouchIcon: /apple-touch-icon.png
  icon192: /assets/icon-192.png
  icon512: /assets/icon-512.png
  manifest: /site.webmanifest
pwa:
  backgroundColor: "#f7f9fb"
  themeColor: "#2357d6"
head:
  meta: []
  links: []
nav:
  links:
    - key: home
      href: /:locale/
      icon: home
      label:
        zh-CN: 首页
        en: Home
    - key: docs
      href: /:locale/docs/
      icon: book-open
      label:
        zh-CN: 文档
        en: Docs
    - key: about
      href: /:locale/about/
      icon: info
      label:
        zh-CN: 关于
        en: About
  utilityLinks:
    - key: search
      href: /:locale/search/
      icon: search
      label:
        zh-CN: 搜索
        en: Search
footer:
  enabled: true
  copyright:
    enabled: true
    text: "Siteforge by jsgripe-teams"
    href: https://github.com/jsw-teams/siteforge
  links: []
plugins:
  comments:
    enabled: false
    provider: none
  analytics:
    cloudflareWebAnalytics:
      enabled: false
      src: https://static.cloudflareinsights.com/beacon.min.js
      token: YOUR_CLOUDFLARE_WEB_ANALYTICS_TOKEN
      defer: true
      consent: analytics
      beacon:
        spa: false
  advertising:
    googleAdsense:
      enabled: false
      client: ca-pub-0000000000000000
      consent: marketing
